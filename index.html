<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>Lotek – losowanie 6 liczb</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="styl.css">
</head>
<body class="bg-light">

<div class="container mt-5">
    <div class="card shadow p-4">
        <h1 class="text-center mb-4 text-primary">🎲 Lotto</h1>
        <form id="formularz">

            <div class="row">
                <div class="col-md-4 mb-3">
                    <label>Liczba 1:</label>
                    <input type="number" class="form-control" id="num1" min="1" max="49">
                </div>

                <div class="col-md-4 mb-3">
                    <label>Liczba 2:</label>
                    <input type="number" class="form-control" id="num2" min="1" max="49">
                </div>

                <div class="col-md-4 mb-3">
                    <label>Liczba 3:</label>
                    <input type="number" class="form-control" id="num3" min="1" max="49">
                </div>

                <div class="col-md-4 mb-3">
                    <label>Liczba 4:</label>
                    <input type="number" class="form-control" id="num4" min="1" max="49">
                </div>

                <div class="col-md-4 mb-3">
                    <label>Liczba 5:</label>
                    <input type="number" class="form-control" id="num5" min="1" max="49">
                </div>

                <div class="col-md-4 mb-3">
                    <label>Liczba 6:</label>
                    <input type="number" class="form-control" id="num6" min="1" max="49">
                </div>
            </div>

            <div class="text-center mt-3">
                <button type="submit" class="btn btn-success me-2">Losuj i sprawdź</button>
                <button type="reset" class="btn btn-danger">Wyczyść</button>
            </div>
        </form>

        <div id="result" class="mt-4 text-center"></div>
    </div>
</div>
<script src="script.js"></script>
</body>
</html>
